<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AO Ranks - Simple</title>
    <link rel="stylesheet" href="style.css">
    
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.7/css/jquery.dataTables.min.css">
    <script src="https://cdn.datatables.net/1.13.7/js/jquery.dataTables.min.js"></script>
</head>
<body>

    <div class="container">
        <div class="filter-bar">
            <select id="srv">
                <option value="americas">AMERICAS</option>
                <option value="europe">EUROPE</option>
                <option value="asia">ASIA</option>
            </select>

            <select id="cat">
                <option value="guilds">GUILDS</option>
                <option value="players">PLAYERS</option>
            </select>

            <select id="tipo">
                <option value="battles">BATTLES</option>
                <option value="battlestotal">TOTAL</option>
            </select>
            
            <select id="mes">
                <option value="1">JANEIRO (1)</option>
                <option value="2">FEVEREIRO (2)</option>
                <option value="3">MARÇO (3)</option>
                <option value="4">ABRIL (4)</option>
            </select>
        </div>

        <table id="rankTable" class="display" style="width:100%">
            <thead id="thead"></thead>
            <tbody id="tbody"></tbody>
        </table>
    </div>

    <script src="script.js"></script>
</body>
</html>
