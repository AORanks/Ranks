<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AO Battles - Ranks Unificado</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="tabs-container">
        <div class="tab-buttons">
            <button class="tab-btn active" onclick="switchCategory(event, 'guildsbattles')">Guilds Battles</button>
            <button class="tab-btn" onclick="switchCategory(event, 'guildsbattlestotal')">Guilds Total</button>
            <button class="tab-btn" onclick="switchCategory(event, 'playersbattles')">Players Battles</button>
            <button class="tab-btn" onclick="switchCategory(event, 'playersbattlestotal')">Players Total</button>
        </div>

        <div class="tab-content-wrapper">
            <div class="filter-container" style="display: flex; gap: 20px; margin-bottom: 15px;">
                <div class="filter-group">
                    <label style="display:block; color:#a8a8b3; margin-bottom:5px;">Servidor</label>
                    <select id="select-server" onchange="applyFilters()" style="background:#202024; color:#fff; padding:8px; border:1px solid #444; border-radius:4px; min-width: 120px;">
                        <option value="americas">Americas</option>
                        <option value="europe">Europe</option>
                        <option value="asia">Asia</option>
                    </select>
                </div>

                <div class="filter-group">
                    <label style="display:block; color:#a8a8b3; margin-bottom:5px;">Mês</label>
                    <select id="select-month" onchange="applyFilters()" style="background:#202024; color:#fff; padding:8px; border:1px solid #444; border-radius:4px; min-width: 120px;">
                        <option value="january">Janeiro</option>
                        <option value="february">Fevereiro</option>
                        <option value="march">Março</option>
                        <option value="april">Abril</option>
                    </select>
                </div>
            </div>

            <hr class="separator" style="border-color: #323238; margin-bottom: 15px;">

            <h2 id="panel-title" style="font-size: 14px; color: #00ff87; font-family: monospace; margin-bottom: 15px;">Carregando...</h2>
            
            <div class="table-responsive">
                <table id="data-table">
                    <thead>
                        <tr id="table-header"></tr>
                    </thead>
                    <tbody id="table-body"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
