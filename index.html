<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AO Ranks - Dashboard Professional</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="terminal-container">
        <header class="terminal-header">
            <h1>AO RANKS // ANALYTICS_SYSTEM</h1>
        </header>

        <div class="filter-bar">
            <div class="filter-group">
                <label>SERVIDOR:</label>
                <select id="select-server" onchange="applyFilters()">
                    <option value="americas">AMERICAS</option>
                    <option value="europe">EUROPE</option>
                    <option value="asia">ASIA</option>
                </select>
            </div>
            
            <div class="filter-group">
                <label>MÊS:</label>
                <select id="select-month" onchange="applyFilters()">
                    <option value="january">JANEIRO (1)</option>
                    <option value="february">FEVEREIRO (2)</option>
                    <option value="march">MARÇO (3)</option>
                    <option value="april">ABRIL (4)</option>
                </select>
            </div>
        </div>

        <div class="main-tabs">
            <button class="main-tab-btn active" onclick="switchMainCategory(event, 'guilds')">GUILDS</button>
            <button class="main-tab-btn" onclick="switchMainCategory(event, 'players')">PLAYERS</button>
        </div>

        <div class="sub-tabs">
            <button class="sub-tab-btn active" id="btn-battles" onclick="switchSubCategory(event, 'battles')">BATTLES</button>
            <button class="sub-tab-btn" id="btn-total" onclick="switchSubCategory(event, 'battlestotal')">TOTAL</button>
        </div>

        <div class="table-responsive">
            <table class="terminal-table">
                <thead>
                    <tr id="table-header"></tr>
                </thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
