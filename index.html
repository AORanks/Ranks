<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AO Ranks // Database</title>
    <link rel="stylesheet" href="style.css">
    
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>
<body>
    <div class="terminal-container">
        <header class="terminal-header">
            <h1>AO RANKS // DATABASE</h1>
            <div class="top-meta-cards">
                <span>REGISTROS: <strong id="total-rows">0</strong></span>
            </div>
        </header>

        <div class="filter-bar">
            <div class="filter-group">
                <label for="select-server">SERVIDOR:</label>
                <select id="select-server">
                    <option value="americas">AMERICAS</option>
                    <option value="europe">EUROPE</option>
                    <option value="asia">ASIA</option>
                </select>
            </div>
            
            <div class="filter-group">
                <label for="select-month">MÊS DE REFERÊNCIA:</label>
                <select id="select-month">
                    <option value="january">JANEIRO (1)</option>
                    <option value="february">FEVEREIRO (2)</option>
                    <option value="march">MARÇO (3)</option>
                    <option value="april">ABRIL (4)</option>
                </select>
            </div>
        </div>

        <div class="main-tabs-container">
            <button class="tab-btn active" data-main="guilds" data-sub="battles">GUILDS BATTLES</button>
            <button class="tab-btn" data-main="guilds" data-sub="battlestotal">GUILDS TOTAL</button>
            <button class="tab-btn" data-main="players" data-sub="battles">PLAYERS BATTLES</button>
            <button class="tab-btn" data-main="players" data-sub="battlestotal">PLAYERS TOTAL</button>
        </div>

        <div class="table-responsive" id="table-wrapper"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
