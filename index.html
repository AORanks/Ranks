<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AO Ranks - Albion Online Battle Archive</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="terminal-container">
        <header class="terminal-header">
            <h1>AO RANKS // BATTLE_DATABASE</h1>
        </header>

        <div class="filter-bar">
            <div class="filter-group">
                <label for="select-server">SERVIDOR:</label>
                <select id="select-server" onchange="applyFilters()">
                    <option value="americas">AMERICAS</option>
                    <option value="europe">EUROPE</option>
                    <option value="asia">ASIA</option>
                </select>
            </div>
            
            <div class="filter-group">
                <label for="select-month">MÊS DE REFERÊNCIA:</label>
                <select id="select-month" onchange="applyFilters()">
                    <option value="january">JANEIRO (1)</option>
                    <option value="february">FEVEREIRO (2)</option>
                    <option value="march">MARÇO (3)</option>
                    <option value="april">ABRIL (4)</option>
                </select>
            </div>
        </div>

        <div class="tab-container">
            <button class="tab-btn active" onclick="switchCategory(event, 'guildsbattles')">GUILDS BATTLES</button>
            <button class="tab-btn" onclick="switchCategory(event, 'guildsbattlestotal')">GUILDS TOTAL</button>
            <button class="tab-btn" onclick="switchCategory(event, 'playersbattles')">PLAYERS BATTLES</button>
            <button class="tab-btn" onclick="switchCategory(event, 'playersbattlestotal')">PLAYERS TOTAL</button>
        </div>

        <div class="table-responsive">
            <table class="terminal-table">
                <thead>
                    <tr id="table-header">
                        </tr>
                </thead>
                <tbody id="table-body">
                    </tbody>
            </table>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
